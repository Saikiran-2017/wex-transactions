services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wex-transactions-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wex_transactions
      SPRING_DATASOURCE_USERNAME: wex_user
      SPRING_DATASOURCE_PASSWORD: wex_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16
    container_name: wex-transactions-postgres
    environment:
      POSTGRES_DB: wex_transactions
      POSTGRES_USER: wex_user
      POSTGRES_PASSWORD: wex_password
    ports:
      - "5432:5432"
    volumes:
      - wex_transactions_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wex_user -d wex_transactions"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  wex_transactions_pg_data:
