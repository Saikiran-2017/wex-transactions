spring:
  application:
    name: wex-transactions

  datasource:
    url: jdbc:postgresql://localhost:5432/wex_transactions
    username: wex_user
    password: wex_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

treasury:
  api:
    base-url: https://fiscaldata.treasury.gov/api/v1/accounting/od/rates_of_exchange
    connect-timeout-ms: 3000
    read-timeout-ms: 5000
